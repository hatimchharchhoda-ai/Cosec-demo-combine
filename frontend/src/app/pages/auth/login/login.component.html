<div class="vh-100 d-flex justify-content-center align-items-center bg-light">
  <div class="card shadow p-4" style="width: 400px;">
    <h4 class="text-center mb-4 text-secondary">COSEC Login</h4>

    <div class="mb-3">
      <label class="form-label">User ID</label>
      <input type="text" class="form-control" [(ngModel)]="loginUserID">
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" [(ngModel)]="loginPassword">
    </div>

    <button class="btn btn-secondary w-100" (click)="login()" [disabled]="isLoading">
      {{ isLoading ? 'Please wait...' : 'Login' }}
    </button>
  </div>
</div>
